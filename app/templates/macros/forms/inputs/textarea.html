<!-- Textarea Macro -->
{% macro textarea(field, placeholder="", rows=4, class="", required=False, disabled=False) %}
<div class="relative">
    <textarea 
        id="{{ field.id }}" 
        name="{{ field.name }}"
        rows="{{ rows }}"
        placeholder="{{ placeholder }}"
        class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm resize-vertical {{ class }}"
        {% if required %}required{% endif %}
        {% if disabled %}disabled{% endif %}
        {% if field.errors %}aria-invalid="true"{% endif %}
    >{{ field.data or '' }}</textarea>
    
    {% if field.errors %}
    <div class="absolute top-2 right-2 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
    </div>
    {% endif %}
</div>
{% endmacro %}
