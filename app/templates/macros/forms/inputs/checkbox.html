<!-- Checkbox Macro -->
{% macro checkbox(field, label="", class="", required=False, disabled=False) %}
<div class="flex items-start">
    <div class="flex items-center h-5">
        <input 
            type="checkbox" 
            id="{{ field.id }}" 
            name="{{ field.name }}"
            value="true"
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 {{ class }}"
            {% if field.data %}checked{% endif %}
            {% if required %}required{% endif %}
            {% if disabled %}disabled{% endif %}
            {% if field.errors %}aria-invalid="true"{% endif %}
        >
    </div>
    
    {% if label %}
    <div class="ml-3 text-sm">
        <label for="{{ field.id }}" class="font-medium text-gray-700 dark:text-gray-300">
            {{ label }}
            {% if required %}
            <span class="text-red-500">*</span>
            {% endif %}
        </label>
    </div>
    {% endif %}
    
    {% if field.errors %}
    <div class="ml-2 flex items-center">
        <svg class="h-4 w-4 text-red-500" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
    </div>
    {% endif %}
</div>
{% endmacro %}
