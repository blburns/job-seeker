<!-- File Input Macro -->
{% macro file_input(field, accept="", multiple=False, class="", required=False, disabled=False) %}
<div class="relative">
    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 dark:border-gray-600 border-dashed rounded-md hover:border-gray-400 dark:hover:border-gray-500 transition-colors">
        <div class="space-y-1 text-center">
            <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="flex text-sm text-gray-600 dark:text-gray-400">
                <label for="{{ field.id }}" class="relative cursor-pointer bg-white dark:bg-gray-700 rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                    <span>Upload a file</span>
                    <input 
                        type="file" 
                        id="{{ field.id }}" 
                        name="{{ field.name }}"
                        class="sr-only"
                        {% if accept %}accept="{{ accept }}"{% endif %}
                        {% if multiple %}multiple{% endif %}
                        {% if required %}required{% endif %}
                        {% if disabled %}disabled{% endif %}
                        {% if field.errors %}aria-invalid="true"{% endif %}
                        onchange="updateFileLabel(this)"
                    >
                </label>
                <p class="pl-1">or drag and drop</p>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400">
                PNG, JPG, GIF up to 10MB
            </p>
        </div>
    </div>
    
    <!-- File preview area -->
    <div id="{{ field.id }}_preview" class="mt-2 hidden">
        <div class="flex items-center justify-between p-2 bg-gray-50 dark:bg-gray-800 rounded-md">
            <div class="flex items-center">
                <svg class="h-5 w-5 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span id="{{ field.id }}_filename" class="text-sm text-gray-700 dark:text-gray-300"></span>
            </div>
            <button type="button" onclick="clearFile('{{ field.id }}')" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    </div>
    
    {% if field.errors %}
    <div class="mt-1">
        {% for error in field.errors %}
        <p class="text-sm text-red-600 dark:text-red-400">{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}
</div>

<script>
function updateFileLabel(input) {
    const preview = document.getElementById('{{ field.id }}_preview');
    const filename = document.getElementById('{{ field.id }}_filename');
    
    if (input.files && input.files.length > 0) {
        const file = input.files[0];
        filename.textContent = file.name;
        preview.classList.remove('hidden');
    } else {
        preview.classList.add('hidden');
    }
}

function clearFile(fieldId) {
    const input = document.getElementById(fieldId);
    const preview = document.getElementById(fieldId + '_preview');
    
    input.value = '';
    preview.classList.add('hidden');
}
</script>
{% endmacro %}
