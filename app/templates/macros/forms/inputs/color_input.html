<!-- Color Input Macro -->
{% macro color_input(field, class="", required=False, disabled=False) %}
<div class="flex items-center space-x-3">
    <div class="relative">
        <input 
            type="color" 
            id="{{ field.id }}" 
            name="{{ field.name }}"
            value="{{ field.data or '#000000' }}"
            class="h-10 w-16 border border-gray-300 dark:border-gray-600 rounded-md cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 {{ class }}"
            {% if required %}required{% endif %}
            {% if disabled %}disabled{% endif %}
            {% if field.errors %}aria-invalid="true"{% endif %}
        >
    </div>
    
    <div class="flex-1">
        <input 
            type="text" 
            id="{{ field.id }}_text" 
            value="{{ field.data or '#000000' }}"
            placeholder="#000000"
            class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
            oninput="updateColorFromText('{{ field.id }}')"
        >
    </div>
    
    {% if field.errors %}
    <div class="flex items-center">
        <svg class="h-5 w-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
    </div>
    {% endif %}
</div>

<script>
function updateColorFromText(fieldId) {
    const colorInput = document.getElementById(fieldId);
    const textInput = document.getElementById(fieldId + '_text');
    
    // Update color input when text changes
    if (textInput.value.match(/^#[0-9A-Fa-f]{6}$/)) {
        colorInput.value = textInput.value;
    }
}

// Update text input when color changes
document.getElementById('{{ field.id }}').addEventListener('change', function() {
    const textInput = document.getElementById('{{ field.id }}_text');
    textInput.value = this.value;
});
</script>
{% endmacro %}
