{% extends "layouts/blank.html" %}

{% block title %}Resend Verification Email{% endblock %}

{% block content %}
<div class="authentication-wrapper authentication-cover">
  <div class="authentication-inner row m-0">
    <!-- Left Section -->
    <div class="d-none d-lg-flex col-lg-7 col-xl-8 align-items-center justify-content-center p-12 pb-2">
      <div>
        <img
          src="{{ url_for('static', filename='assets/img/illustrations/auth-forgot-password-illustration-light.png') }}"
          class="authentication-image-model d-none d-lg-block"
          alt="auth-forgot-password-cover"
          data-app-light-img="illustrations/auth-forgot-password-illustration-light.png"
          data-app-dark-img="illustrations/auth-forgot-password-illustration-dark.png" />
      </div>
    </div>
    <!-- /Left Section -->

    <!-- Resend Verification -->
    <div class="d-flex col-12 col-lg-5 col-xl-4 align-items-center authentication-bg position-relative py-sm-12 px-12 py-6">
      <div class="w-px-400 mx-auto pt-5 pt-lg-0">
        <h4 class="mb-1">Resend Verification Email</h4>
        <p class="mb-5">Enter your email address and we'll send you a new verification link</p>

        <form id="formAuthentication" class="mb-5" action="{{ url_for('auth.resend_verification') }}" method="POST">
          <div class="form-floating form-floating-outline mb-5">
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              value="{{ email }}"
              placeholder="Enter your email"
              autofocus
              required />
            <label for="email">Email</label>
          </div>
          <button class="btn btn-primary d-grid w-100">Send Verification Link</button>
        </form>

        <div class="text-center">
          <a href="{{ url_for('auth.login') }}" class="d-flex align-items-center justify-content-center">
            <i class="icon-base ti ti-chevron-left me-1_5"></i>
            Back to login
          </a>
        </div>
      </div>
    </div>
    <!-- /Resend Verification -->
  </div>
</div>
{% endblock %}
