{% extends "base.html" %}
{% from 'macros/page_layout.html' import page_header %}
{% block title %}Fetch Job from URL{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    {% call page_header('Fetch Job from URL', 'Import a posting from a job board link') %}{% endcall %}
    <div class="card">
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-4">
            <label class="form-label" for="job-url">Job posting URL</label>
            <input type="url" name="url" id="job-url" class="form-control" placeholder="https://..." required>
          </div>
          <button type="submit" class="btn btn-primary">Fetch &amp; Review</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
