{% extends "base.html" %}
{% from 'macros/page_layout.html' import page_header %}
{% block title %}Add Job Posting{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-10">
    {% call page_header('Add Job Posting', 'Paste or edit job details for analysis') %}{% endcall %}
    <div class="card">
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label" for="job-title">Job Title *</label>
              <input type="text" name="title" id="job-title" class="form-control" value="{{ job_data.title if job_data else '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label" for="job-company">Company *</label>
              <input type="text" name="company" id="job-company" class="form-control" value="{{ job_data.company if job_data else '' }}" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label" for="job-location">Location</label>
              <input type="text" name="location" id="job-location" class="form-control" value="{{ job_data.location if job_data else '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label" for="job-url">URL</label>
              <input type="url" name="url" id="job-url" class="form-control" value="{{ job_data.url if job_data else '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="job-description">Job Description *</label>
            <textarea name="description" id="job-description" class="form-control" rows="10" required>{{ job_data.description if job_data else '' }}</textarea>
          </div>
          <div class="mb-4">
            <label class="form-label" for="job-requirements">Requirements</label>
            <textarea name="requirements" id="job-requirements" class="form-control" rows="5"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Job</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
