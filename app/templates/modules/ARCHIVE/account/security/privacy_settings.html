{% extends "base_metronic.html" %}

{% block title %}Privacy Settings - {{ config.get('APP_NAME', 'Application') }}{% endblock %}

{% block content %}
<!-- Container -->
<div class="kt-container-fixed">
    <div class="flex flex-wrap items-center lg:items-end justify-between gap-5 pb-7.5">
        <div class="flex flex-col justify-center gap-2">
            <h1 class="text-xl font-medium leading-none text-mono">Privacy Settings</h1>
            <div class="flex items-center gap-2 text-sm font-normal text-secondary-foreground">
                Control your privacy and data sharing preferences
            </div>
        </div>
    </div>
</div>
<!-- End of Container -->

<!-- Container -->
<div class="kt-container-fixed">
    <div class="kt-card">
        <div class="kt-card-header">
            <h3 class="kt-card-title">Privacy Preferences</h3>
        </div>
        <div class="kt-card-content flex flex-col gap-4 p-5 lg:p-7.5">
            <label class="kt-label">
                <input class="kt-checkbox" type="checkbox" checked/>
                <span class="kt-checkbox-label">
                    <span class="text-sm font-semibold text-mono">Profile Visibility</span>
                    <span class="text-xs text-secondary-foreground block">Allow others to view your profile</span>
                </span>
            </label>
            
            <label class="kt-label">
                <input class="kt-checkbox" type="checkbox"/>
                <span class="kt-checkbox-label">
                    <span class="text-sm font-semibold text-mono">Activity Tracking</span>
                    <span class="text-xs text-secondary-foreground block">Allow us to track your activity for analytics</span>
                </span>
            </label>
            
            <label class="kt-label">
                <input class="kt-checkbox" type="checkbox" checked/>
                <span class="kt-checkbox-label">
                    <span class="text-sm font-semibold text-mono">Email Notifications</span>
                    <span class="text-xs text-secondary-foreground block">Receive email updates about your account</span>
                </span>
            </label>
            
            <label class="kt-label">
                <input class="kt-checkbox" type="checkbox"/>
                <span class="kt-checkbox-label">
                    <span class="text-sm font-semibold text-mono">Data Sharing</span>
                    <span class="text-xs text-secondary-foreground block">Allow sharing of anonymized data for product improvement</span>
                </span>
            </label>
        </div>
    </div>
</div>
<!-- End of Container -->
{% endblock %}
