{% extends "base_metronic.html" %}

{% block title %}User Profile - {{ config.get('APP_NAME', 'Application') }}{% endblock %}

{% block content %}
<!-- Container -->
<div class="kt-container-fixed">
    <div class="flex flex-wrap items-center lg:items-end justify-between gap-5 pb-7.5">
        <div class="flex flex-col justify-center gap-2">
            <h1 class="text-xl font-medium leading-none text-mono">User Profile</h1>
            <div class="flex items-center gap-2 text-sm font-normal text-secondary-foreground">
                Manage your personal information
            </div>
        </div>
    </div>
</div>
<!-- End of Container -->

<!-- Container -->
<div class="kt-container-fixed">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <!-- Profile Picture -->
        <div class="kt-card">
            <div class="kt-card-content flex flex-col items-center gap-4 p-5 lg:p-7.5">
                <div class="kt-avatar size-32">
                    <div class="kt-avatar-image">
                        <img alt="avatar" src="{{ url_for('static', filename='assets/media/avatars/300-1.png') }}"/>
                    </div>
                </div>
                <h3 class="text-lg font-semibold text-mono">{{ get_user_display_name() }}</h3>
                <p class="text-sm text-secondary-foreground">{{ get_user_email() }}</p>
                <button class="kt-btn kt-btn-outline kt-btn-sm">Change Photo</button>
            </div>
        </div>
        
        <!-- Profile Form -->
        <div class="kt-card lg:col-span-2">
            <div class="kt-card-header">
                <h3 class="kt-card-title">Personal Information</h3>
            </div>
            <div class="kt-card-content flex flex-col gap-4 p-5 lg:p-7.5">
                <form class="flex flex-col gap-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="kt-form-label">First Name</label>
                            <input class="kt-input" type="text" value="{{ current_user.first_name if current_user.first_name else '' }}"/>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="kt-form-label">Last Name</label>
                            <input class="kt-input" type="text" value="{{ current_user.last_name if current_user.last_name else '' }}"/>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="kt-form-label">Email</label>
                        <input class="kt-input" type="email" value="{{ get_user_email() }}" readonly/>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="kt-form-label">Username</label>
                        <input class="kt-input" type="text" value="{{ current_user.username if current_user.username else '' }}"/>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="kt-form-label">Bio</label>
                        <textarea class="kt-input" rows="4" placeholder="Tell us about yourself..."></textarea>
                    </div>
                    
                    <div class="flex justify-end gap-2.5 pt-4 border-t border-border">
                        <button class="kt-btn kt-btn-outline" type="button">Cancel</button>
                        <button class="kt-btn kt-btn-primary" type="submit">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- End of Container -->
{% endblock %}
