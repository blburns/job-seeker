{% extends "base_metronic.html" %}

{% block title %}Appearance - {{ config.get('APP_NAME', 'Application') }}{% endblock %}

{% block content %}
<!-- Container -->
<div class="kt-container-fixed">
    <div class="flex flex-wrap items-center lg:items-end justify-between gap-5 pb-7.5">
        <div class="flex flex-col justify-center gap-2">
            <h1 class="text-xl font-medium leading-none text-mono">Appearance</h1>
            <div class="flex items-center gap-2 text-sm font-normal text-secondary-foreground">
                Customize your application appearance
            </div>
        </div>
    </div>
</div>
<!-- End of Container -->

<!-- Container -->
<div class="kt-container-fixed">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <!-- Theme Settings -->
        <div class="kt-card">
            <div class="kt-card-header">
                <h3 class="kt-card-title">Theme</h3>
            </div>
            <div class="kt-card-content flex flex-col gap-4 p-5 lg:p-7.5">
                <div class="flex flex-col gap-2">
                    <label class="kt-form-label">Color Mode</label>
                    <div class="flex gap-2.5">
                        <label class="kt-label cursor-pointer">
                            <input class="kt-radio" type="radio" name="theme" value="light" checked/>
                            <span class="kt-radio-label">Light</span>
                        </label>
                        <label class="kt-label cursor-pointer">
                            <input class="kt-radio" type="radio" name="theme" value="dark"/>
                            <span class="kt-radio-label">Dark</span>
                        </label>
                        <label class="kt-label cursor-pointer">
                            <input class="kt-radio" type="radio" name="theme" value="system"/>
                            <span class="kt-radio-label">System</span>
                        </label>
                    </div>
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="kt-form-label">Primary Color</label>
                    <div class="flex gap-2.5">
                        <button class="size-10 rounded-full bg-primary border-2 border-primary"></button>
                        <button class="size-10 rounded-full bg-blue-500 border-2 border-border"></button>
                        <button class="size-10 rounded-full bg-green-500 border-2 border-border"></button>
                        <button class="size-10 rounded-full bg-purple-500 border-2 border-border"></button>
                        <button class="size-10 rounded-full bg-orange-500 border-2 border-border"></button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Layout Settings -->
        <div class="kt-card">
            <div class="kt-card-header">
                <h3 class="kt-card-title">Layout</h3>
            </div>
            <div class="kt-card-content flex flex-col gap-4 p-5 lg:p-7.5">
                <label class="kt-label">
                    <input class="kt-checkbox" type="checkbox" checked/>
                    <span class="kt-checkbox-label">Compact sidebar</span>
                </label>
                <label class="kt-label">
                    <input class="kt-checkbox" type="checkbox"/>
                    <span class="kt-checkbox-label">Fixed header</span>
                </label>
                <label class="kt-label">
                    <input class="kt-checkbox" type="checkbox" checked/>
                    <span class="kt-checkbox-label">Show breadcrumbs</span>
                </label>
            </div>
        </div>
    </div>
</div>
<!-- End of Container -->
{% endblock %}
