{% extends "base.html" %}

{% block title %}{{ title }} - Admin - {{ config.get('APP_NAME', 'Application') }}{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">
  <div class="row">
    <div class="col-md-12">
      <div class="card text-center">
        <div class="card-body p-5">
          <div class="avatar avatar-xl bg-label-primary rounded mb-4 mx-auto">
            <i class="ti ti-tool ti-xl"></i>
          </div>
          <h3 class="mb-2">{{ title }}</h3>
          <p class="text-muted mb-4">{{ message }}</p>
          <a href="{{ url_for('admin.dashboard') }}" class="btn btn-primary">
            <i class="ti ti-arrow-left me-1"></i>
            Back to Dashboard
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
