{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h5 class="mb-0">Edit Master Profile</h5></div>
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <textarea name="profile_data" class="form-control font-monospace mb-3" rows="28">{{ profile_json }}</textarea>
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('resume.profile_detail', profile_id=profile.id) }}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
